<!DOCTYPE html>
<html>
<head>
    <title>View Contacts</title>
</head>
<body>

<h2>Submitted Contacts</h2>

<table border="1" style="margin:auto;">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Age</th>
    <th>Address</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
